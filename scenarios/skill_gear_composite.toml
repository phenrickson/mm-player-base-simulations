name = "skill_gear_composite"
category = "matchmaker"

# Composite matchmaker balancing skill and gear. Gear is meaningful in
# match outcomes (gear_weight=0.5 from defaults), so MM tries to match
# both axes.

[config.matchmaker]
kind = "composite"
composite_weights = {skill = 0.8, experience = 0.0, gear = 0.2}
