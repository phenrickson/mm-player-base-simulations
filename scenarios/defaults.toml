# Shared defaults for every scenario in this directory. Individual
# scenario files can override any of these by setting the same key.
# This file is not itself a scenario (no `name` field).
#
# Season name is computed as
#   {season_days}d-{initial_size}p-{true_skill_distribution}-{season_suffix}
# so it auto-updates when you change the underlying config. Edit
# `season_suffix` to tag a research question; the mechanical parts
# track config automatically.
season_suffix = "asymmetric-progression"

[config]
seed = 1999
season_days = 90

[config.population]
initial_size = 15000
true_skill_distribution = "right_skewed"
# Daily arrivals as a fraction of `initial_size`, frozen at startup.
# 0.0067 with initial_size=15000 → 100 new players/day. Set to 0 for
# a closed-cohort study.
daily_new_player_fraction = 0.0067

[config.parties]
# Mix of solo/duo/trio parties. Must sum to 1.0.
size_distribution = {1 = 0.5, 2 = 0.2, 3 = 0.3}

[config.outcomes]
# Gear contribution to match performance alongside true_skill.
# 0.0 = gear is cosmetic; 0.5 = gear meaningfully affects outcomes.
gear_weight = 0.5

[config.frequency]
mean_matches_per_day = 5.0

[config.churn]
baseline_daily_quit_prob = 0.005
loss_weight = 0.04 # losing increases probability of droppping
blowout_loss_weight = 0.14 # blowout losses have a huge impact
win_streak_weight = -0.02
# New-player loss sensitivity: a player with 0 matches_played gets
# (1 + new_player_bonus)x the loss/blowout impact; it ramps linearly
# down to 1x at new_player_threshold matches.
new_player_bonus = 0.75
new_player_threshold = 15
loss_streak_exp = 0.3
max_loss_streak_multiplier = 4.0

[config.skill_progression]
enabled = true

[config.gear]
transfer_enabled = true

[config.season_progression]
enabled = true
