name = "random_mm_all_progression"
category = "matchmaker"

# No matchmaking, full progression — the "lower bound" reference for the
# skill-weight sweep. Shares the all_progression_base config so the only
# difference from a sweep point is that matches are formed randomly.

[config.parties]
size_distribution = {1 = 1.0}

[config.matchmaker]
kind = "random"

[config.outcomes]
gear_weight = 0.5

[config.skill_progression]
enabled = true
tau = 75.0
noise_std = 0.02

[config.gear]
transfer_enabled = true
transfer_rate = 0.01
transfer_rate_blowout = 0.04
growth_per_match = 0.002

[config.season_progression]
enabled = true
earn_per_match = 0.02
curve_steepness = 3.0
behind_weight = 0.02
boredom_weight = 0.01
boredom_cutoff = 0.7
